        <form class="calc-shell" id="scientific-form"><div class="form-grid"><label>Expression <input id="scientific-display" type="text" placeholder="e.g. 2+sin(30)" autocomplete="off" /></label><div class="scientific-grid"><button type="button" data-value="7">7</button><button type="button" data-value="8">8</button><button type="button" data-value="9">9</button><button type="button" data-value="/">/</button><button type="button" data-value="4">4</button><button type="button" data-value="5">5</button><button type="button" data-value="6">6</button><button type="button" data-value="*">*</button><button type="button" data-value="1">1</button><button type="button" data-value="2">2</button><button type="button" data-value="3">3</button><button type="button" data-value="-">-</button><button type="button" data-value="0">0</button><button type="button" data-value=".">.</button><button type="button" data-value="+">+</button><button type="button" data-value="(">(</button><button type="button" data-value=")">)</button><button type="button" data-value="Math.sin(30*Math.PI/180)">sin</button><button type="button" data-value="Math.cos(30*Math.PI/180)">cos</button><button type="button" data-value="Math.tan(30*Math.PI/180)">tan</button><button type="button" data-value="Math.log10(100)">log</button><button type="button" data-value="Math.log(2.718281828)">ln</button><button type="button" data-value="Math.sqrt(16)">√</button><button type="button" data-value="Math.pow(2,3)">x²</button><button type="button" data-value="Math.PI">π</button><button type="button" data-value="Math.E">e</button><button type="button" data-value="Math.pow(2,4)">xʸ</button></div><div class="memory-row"><button class="btn btn-secondary" type="button" id="clear-display">Clear</button><button class="btn btn-secondary" type="button" id="backspace-display">Backspace</button><button class="btn btn-primary" type="submit">Evaluate</button></div></div></form>
