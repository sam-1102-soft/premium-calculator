<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Currency Converter | AllCalc Pro</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body data-page="currency">
    <div class="toast-container" id="toast-container"></div>
    <header class="topbar"><a class="brand" href="../index.html"><span class="brand-mark">A</span><span><strong>AllCalc Pro</strong><small>Currency Converter</small></span></a><nav class="top-nav"><a href="../index.html">Home</a><button class="theme-toggle" id="theme-toggle">🌙</button></nav></header>
    <main class="page-shell has-sidebar">
      <aside class="sidebar"><div class="sidebar-card"><h3>Calculator suite</h3><a class="nav-link" href="basic.html">Basic</a><a class="nav-link" href="scientific.html">Scientific</a><a class="nav-link" href="health.html">Health</a><a class="nav-link" href="emi.html">Finance</a><a class="nav-link" href="cgpa.html">Education</a><a class="nav-link" href="length.html">Converters</a><a class="nav-link" href="age.html">Utility</a></div></aside>
      <section class="calc-shell">
        <div class="page-intro"><div><p class="eyebrow">Utility • 💱</p><h1>Currency Converter</h1><p class="breadcrumbs"><a href="../index.html">Home</a> / Currency converter</p></div></div>
        <form class="calc-shell">
          <div class="form-grid">
            <label>Amount <input id="amount" type="number" step="any" required /></label>
            <label>From <select id="from-currency"><option value="USD">USD</option><option value="EUR">EUR</option><option value="GBP">GBP</option><option value="INR">INR</option><option value="JPY">JPY</option></select></label>
            <label>To <select id="to-currency"><option value="INR">INR</option><option value="USD">USD</option><option value="EUR">EUR</option><option value="GBP">GBP</option><option value="JPY">JPY</option></select></label>
            <button class="btn btn-primary" type="submit">Convert</button>
          </div>
        </form>
        <div class="result-card"><div class="result-actions"><button class="btn btn-secondary copy-result">Copy result</button><button class="btn btn-secondary share-result">Share</button></div><div class="result" id="result-output">Your result will appear here.</div></div>
      </section>
    </main>
    <script src="../js/calculators.js"></script>
    <script src="../script.js"></script>
  </body>
</html>
